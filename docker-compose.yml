version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: texttocad-postgres
    environment:
      POSTGRES_USER: texttocad
      POSTGRES_PASSWORD: texttocad-dev
      POSTGRES_DB: texttocad
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U texttocad"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - texttocad-network

  # Redis 缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: texttocad-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - texttocad-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: texttocad-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - texttocad-network

  # 创建 MinIO bucket
  createbuckets:
    image: minio/mc:latest
    container_name: texttocad-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/texttocad-models || true;
      /usr/bin/mc policy set public myminio/texttocad-models;
      exit 0;
      "
    networks:
      - texttocad-network

  # 后端 API 服务
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: texttocad-backend
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://texttocad:texttocad-dev@postgres:5432/texttocad
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - model_storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - texttocad-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: texttocad-worker
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://texttocad:texttocad-dev@postgres:5432/texttocad
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - model_storage:/app/storage
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - texttocad-network
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=2

  # Celery Beat (定时任务)
  beat:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: texttocad-beat
    environment:
      - DATABASE_URL=postgresql://texttocad:texttocad-dev@postgres:5432/texttocad
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    networks:
      - texttocad-network
    command: celery -A worker.celery_app beat --loglevel=info

  # 前端开发服务器
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    container_name: texttocad-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - texttocad-network
    command: npm run dev -- --host

volumes:
  postgres_data:
  redis_data:
  minio_data:
  model_storage:

networks:
  texttocad-network:
    driver: bridge
